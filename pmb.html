        <div class="top-header">

            <img src="img/image_750x_66c749536c070.jpg" width="80"
                 alt="Logo SMA Negeri 6 Palembang"
                 class="logo">

            <div class="title">
                <h2>SMA Negeri 6 Palembang</h2>
                <p>Unggul, Cerdas, Beriman</p>
            </div>

        </div>

    </div>

    <nav>

<section class="container hero">

    <h1>Penerimaan Peserta Didik Baru (PPDB)</h1>

    <p style="margin-top:15px;">
        SMA Negeri 6 Palembang membuka Penerimaan Peserta Didik Baru
        Tahun Ajaran 2026/2027.
    </p>

    <br>

    <div class="form-container">

        <form>

            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" placeholder="Masukkan nama lengkap">
            </div>

            <br>

            <div class="form-group">
                <label>Jenis Kelamin</label>

                <select>
                    <option>Jenis Kelamin</option>
                    <option>Laki-Laki</option>
                    <option>Perempuan</option>
                </select>
            </div>
            <br>
            <div class="form-group">
                <label>Tempat, Tanggal Lahir</label>
                <input type="text" placeholder="Contoh: Palembang, 01 Januari 2009">
            </div>
            <br>
            <div class="form-group">
                <label>Nomor HP</label>
                <input type="text" placeholder="08xxxxxxxxxx">
            </div>
            <br>
            <div class="form-group">
                <label>Alamat</label>
                <textarea rows="4"></textarea>
            </div>
            <br>
            <div class="form-group">
                <label>Asal Sekolah</label>
                <input type="text" placeholder="Nama SMP/MTs">
            </div>
            <br>
            <button type="submit">
                Daftar Sekarang
            </button>

        </form>

    </div>

</section>

<footer>
    © 2025 SMA Negeri 6 Palembang
</footer>
